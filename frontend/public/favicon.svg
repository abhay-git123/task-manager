<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8CFF"></stop>
      <stop offset="100%" stop-color="#7B4DFF"></stop>
    </linearGradient>

    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#5B21B6"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.2"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="24" y="24" width="464" height="464" rx="110" fill="url(#bg)"></rect>

  <!-- Clipboard -->
  <g filter="url(#shadow)">
    <rect x="128" y="100" width="256" height="320" rx="28" fill="#ffffff"></rect>

    <rect x="184" y="72" width="144" height="52" rx="18" fill="#EEF2FF"></rect>

    <rect x="210" y="88" width="92" height="20" rx="10" fill="#CBD5E1"></rect>
  </g>

  <!-- Checklist -->
  <circle cx="172" cy="180" r="11" fill="#4F8CFF"></circle>
  <rect x="200" y="170" width="120" height="16" rx="8" fill="#CBD5E1"></rect>

  <circle cx="172" cy="240" r="11" fill="#4F8CFF"></circle>
  <rect x="200" y="230" width="100" height="16" rx="8" fill="#CBD5E1"></rect>

  <circle cx="172" cy="300" r="11" fill="#4F8CFF"></circle>
  <rect x="200" y="290" width="130" height="16" rx="8" fill="#CBD5E1"></rect>

  <!-- Check Badge -->
  <circle cx="352" cy="352" r="58" fill="url(#badge)"></circle>

  <path d="M329 353 L345 369 L379 334" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>